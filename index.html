<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic Pizza Slicer - GCSE Maths Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
        
        body {
            background-color: #1a0b2e;
            color: white;
            font-family: 'ui-sans-serif', system-ui, sans-serif;
            overflow-x: hidden;
            user-select: none;
        }

        .font-space {
            font-family: 'Orbitron', sans-serif;
        }

        .starfield {
            position: absolute;
            inset: 0;
            opacity: 0.2;
            pointer-events: none;
            background-image: radial-gradient(circle, #fff 1px, transparent 1px);
            background-size: 30px 30px;
        }

        .success-flash {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 100;
            background-color: #22c55e;
            mix-blend-mode: screen;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .success-flash.active {
            opacity: 1;
        }

        .alien-bounce {
            animation: alien-bounce-anim 0.2s infinite;
        }

        @keyframes alien-bounce-anim {
            0%, 100% { transform: translateY(0) scale(1.1); }
            50% { transform: translateY(-5px) scale(1.1); }
        }

        .flywheel-knob {
            cursor: grab;
        }

        .flywheel-knob:active {
            cursor: grabbing;
        }

        .digital-font {
            font-family: 'Courier New', Courier, monospace;
        }

        /* Pulse for the "Make Slice" button when angle changes */
        .btn-pulse {
            animation: pulse-blue 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse-blue {
            0%, 100% { opacity: 1; }
            50% { opacity: .7; }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4 md:p-8 relative">
    <div class="starfield"></div>
    <div id="successFlash" class="success-flash"></div>

    <!-- Header Section -->
    <header class="text-center z-10 mb-8">
        <h1 class="text-3xl md:text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-green-400 to-blue-500 uppercase tracking-widest drop-shadow-[0_0_15px_rgba(74,222,128,0.6)] font-space">
            Cosmic Pizza Slicer
        </h1>
        <div class="mt-4 bg-blue-900/40 border border-blue-500/30 px-6 py-2 rounded-full inline-block backdrop-blur-md">
            <p class="text-blue-200 font-bold text-lg">System Status: <span class="text-green-400">Ready to Symmetrize</span></p>
        </div>
    </header>

    <!-- Main Layout -->
    <main class="grid grid-cols-1 lg:grid-cols-3 gap-8 w-full max-w-7xl z-10 items-start">
        
        <!-- Left: Customer Queue -->
        <section class="bg-purple-900/30 border-2 border-purple-500/40 rounded-3xl p-6 backdrop-blur-md shadow-2xl">
            <div class="flex justify-between items-center mb-6 border-b border-purple-500/30 pb-3">
                <h2 class="text-xl font-bold text-purple-300 uppercase tracking-wider font-space">Orders</h2>
                <span id="totalWeightDisplay" class="bg-yellow-500/20 text-yellow-400 px-3 py-1 rounded-lg border border-yellow-500/50 font-black text-xl">0 kg</span>
            </div>
            
            <div id="customerContainer" class="space-y-4">
                <!-- Customer Cards injected here -->
            </div>
            
            <div id="feedbackBox" class="mt-8 hidden p-5 rounded-2xl text-center font-bold border-2 transition-all duration-300">
                <!-- Feedback injected here -->
            </div>
        </section>

        <!-- Center: The Interstellar Pizza -->
        <section class="flex flex-col items-center justify-center py-10">
            <div id="pizzaWrapper" class="relative w-72 h-72 sm:w-96 sm:h-96 rounded-full shadow-[0_0_60px_rgba(249,115,22,0.2)] transition-all duration-700 bg-black/20 p-2">
                <svg id="pizzaSvg" viewBox="0 0 200 200" class="w-full h-full drop-shadow-2xl">
                    <!-- Outer Crust -->
                    <circle cx="100" cy="100" r="95" fill="#ca8a04" />
                    <circle cx="100" cy="100" r="90" fill="#eab308" />
                    <!-- Cheese -->
                    <circle cx="100" cy="100" r="82" fill="#fef08a" />
                    <!-- Visual Toppings -->
                    <circle cx="65" cy="55" r="7" fill="#ef4444" opacity="0.9"/>
                    <circle cx="135" cy="75" r="9" fill="#ef4444" opacity="0.9"/>
                    <circle cx="95" cy="145" r="11" fill="#ef4444" opacity="0.9"/>
                    <circle cx="55" cy="125" r="6" fill="#ef4444" opacity="0.9"/>
                    <circle cx="155" cy="125" r="8" fill="#ef4444" opacity="0.9"/>
                    
                    <!-- Slicing Visualization Layer -->
                    <g id="sliceLinesGroup"></g>
                    <!-- Floating Target Line (Preview) -->
                    <line id="previewLine" x1="100" y1="100" x2="100" y2="5" stroke="#3b82f6" stroke-width="3" stroke-dasharray="5 3" stroke-linecap="round" opacity="0.8" />
                    
                    <!-- Center Hub -->
                    <circle cx="100" cy="100" r="5" fill="#1e1b4b" />
                </svg>
                <!-- HUD Ring -->
                <div class="absolute inset-0 rounded-full border-2 border-blue-500/10 pointer-events-none"></div>
                <div class="absolute inset-[-10px] rounded-full border border-dashed border-blue-500/20 pointer-events-none animate-[spin_120s_linear_infinite]"></div>
            </div>
            
            <div class="mt-10 flex flex-wrap justify-center gap-3">
                <span class="bg-red-500/20 text-red-300 border border-red-500/30 px-4 py-1 rounded-full text-xs font-bold uppercase tracking-widest">
                    Fixed Start: 0°
                </span>
                <span class="bg-blue-500/20 text-blue-300 border border-blue-500/30 px-4 py-1 rounded-full text-xs font-bold uppercase tracking-widest">
                    Precision: 1°
                </span>
            </div>
        </section>

        <!-- Right: Control Deck -->
        <section class="bg-blue-900/20 border-2 border-blue-500/40 rounded-3xl p-6 backdrop-blur-md shadow-2xl flex flex-col items-center">
            <h2 class="text-xl font-bold text-blue-300 uppercase tracking-wider mb-6 font-space">Control Deck</h2>
            
            <!-- Angle Readout -->
            <div class="w-full bg-black/80 border-2 border-blue-400/50 rounded-2xl p-6 text-center shadow-[inset_0_0_20px_rgba(59,130,246,0.3)] mb-8">
                <div class="text-xs text-blue-400 uppercase tracking-widest mb-1 font-bold">Current Trajectory</div>
                <div id="angleDisplay" class="text-6xl font-black text-blue-400 digital-font drop-shadow-[0_0_8px_rgba(59,130,246,0.8)]">
                    000°
                </div>
            </div>

            <!-- The Flywheel -->
            <div id="flywheel" class="relative w-56 h-56 mb-10 select-none">
                <!-- Static Ring -->
                <div class="absolute inset-0 rounded-full border-[18px] border-slate-800 bg-slate-900 shadow-2xl flex items-center justify-center">
                    <div class="w-20 h-20 rounded-full bg-black border-4 border-slate-700 shadow-inner"></div>
                </div>
                <!-- Rotating Interface -->
                <div id="rotator" class="absolute inset-0 rounded-full transition-transform duration-100 ease-out">
                    <!-- Pointer Line -->
                    <div class="absolute top-0 bottom-1/2 left-1/2 w-1 -ml-[0.5px] bg-blue-400/40"></div>
                    <!-- Interaction Knob -->
                    <div id="knob" class="flywheel-knob absolute top-0 left-1/2 -translate-x-1/2 -translate-y-1/2 w-14 h-14 bg-gradient-to-br from-blue-500 to-blue-700 rounded-full shadow-[0_0_15px_rgba(59,130,246,0.6)] border-4 border-slate-200 flex items-center justify-center hover:scale-110 transition-transform">
                        <div class="w-4 h-4 bg-white/30 rounded-full"></div>
                    </div>
                </div>
            </div>

            <!-- Actions -->
            <div class="w-full space-y-4">
                <button id="btnMakeSlice" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-2xl flex items-center justify-center gap-2 transition-all active:scale-95 border-b-4 border-blue-800 shadow-lg group">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M6 15h12"/><path d="M12 9v12"/></svg>
                    MARK POSITION
                </button>
                
                <div class="grid grid-cols-2 gap-4">
                    <button id="btnClear" class="bg-slate-700 hover:bg-slate-600 text-slate-200 font-bold py-3 rounded-xl transition-all active:scale-95 border-b-4 border-slate-900">
                        RESET
                    </button>
                    <button id="btnSliceNow" class="bg-green-600 hover:bg-green-500 text-white font-black py-3 rounded-xl transition-all active:scale-95 border-b-4 border-green-800 shadow-[0_5px_15px_rgba(34,197,94,0.3)]">
                        SLICE!
                    </button>
                </div>
            </div>
        </section>
    </main>

    <script>
        // --- Game Engine State ---
        let customers = [];
        let currentAngle = 0;
        let placedLines = [0]; // Fixed starting line at 0 degrees
        let gameState = 'playing';
        let isDragging = false;

        // --- Cache DOM ---
        const totalWeightDisplay = document.getElementById('totalWeightDisplay');
        const customerContainer = document.getElementById('customerContainer');
        const sliceLinesGroup = document.getElementById('sliceLinesGroup');
        const previewLine = document.getElementById('previewLine');
        const angleDisplay = document.getElementById('angleDisplay');
        const rotator = document.getElementById('rotator');
        const knob = document.getElementById('knob');
        const flywheel = document.getElementById('flywheel');
        const btnMakeSlice = document.getElementById('btnMakeSlice');
        const btnClear = document.getElementById('btnClear');
        const btnSliceNow = document.getElementById('btnSliceNow');
        const feedbackBox = document.getElementById('feedbackBox');
        const successFlash = document.getElementById('successFlash');
        const pizzaWrapper = document.getElementById('pizzaWrapper');

        // --- Helper: Coordinate Mapping ---
        function polarToCartesian(centerX, centerY, radius, angleInDegrees) {
            // Adjust so 0 degrees is 12 o'clock
            const angleInRadians = (angleInDegrees - 90) * Math.PI / 180.0;
            return {
                x: centerX + (radius * Math.cos(angleInRadians)),
                y: centerY + (radius * Math.sin(angleInRadians))
            };
        }

        // --- Core: Level Generation ---
        function generateLevel() {
            // Predetermined "Neat" Angle Sets summing to 360
            const possibleSlices = [
                [180, 120, 60], [120, 120, 120], [150, 150, 60], 
                [180, 90, 90], [160, 120, 80], [140, 140, 80], 
                [200, 100, 60], [210, 90, 60], [135, 135, 90]
            ];
            
            let targets = possibleSlices[Math.floor(Math.random() * possibleSlices.length)];
            targets = targets.sort(() => Math.random() - 0.5);
            
            // Pick a divisor that keeps weights as integers (e.g., divide by 2, 3, 5, or 10)
            const divisors = [1, 2, 3, 4, 5, 10].filter(d => targets.every(t => t % d === 0));
            const div = divisors.length > 0 ? divisors[Math.floor(Math.random() * divisors.length)] : 1;
            
            const emojis = ['👽', '👾', '🤖', '🐙', '👁️', '🪐', '☄️'].sort(() => Math.random() - 0.5);

            return targets.map((angle, i) => ({
                id: i,
                weight: angle / div,
                targetAngle: angle,
                emoji: emojis[i],
                angry: false
            }));
        }

        // --- Core: UI Rendering ---
        function renderCustomers() {
            const total = customers.reduce((sum, c) => sum + c.weight, 0);
            totalWeightDisplay.innerText = `${total} kg`;
            
            customerContainer.innerHTML = customers.map(c => `
                <div class="flex items-center gap-4 bg-purple-950/50 p-4 rounded-2xl border-2 ${c.angry ? 'border-red-500 animate-pulse' : 'border-purple-600/30'} transition-all duration-300">
                    <div class="text-5xl drop-shadow-lg ${c.angry ? 'alien-bounce' : ''}">
                        ${c.angry ? '😡' : c.emoji}
                    </div>
                    <div class="flex-1">
                        <div class="text-[10px] text-purple-300 font-bold uppercase tracking-widest opacity-70">Weight Class</div>
                        <div class="text-3xl font-black ${c.angry ? 'text-red-400' : 'text-green-400'} font-space">${c.weight}kg</div>
                    </div>
                </div>
            `).join('');
        }

        function updatePizzaDisplay() {
            // Draw confirmed lines
            sliceLinesGroup.innerHTML = placedLines.map(angle => {
                const pt = polarToCartesian(100, 100, 95, angle);
                const isStart = angle === 0;
                return `
                    <line x1="100" y1="100" x2="${pt.x}" y2="${pt.y}" 
                        stroke="${isStart ? '#ef4444' : '#1e1b4b'}" 
                        stroke-width="${isStart ? '3' : '4'}" 
                        stroke-linecap="round" 
                        ${isStart ? 'stroke-dasharray="3 2"' : ''} />
                `;
            }).join('');

            // Update preview line position
            const previewPt = polarToCartesian(100, 100, 95, currentAngle);
            previewLine.setAttribute('x2', previewPt.x);
            previewLine.setAttribute('y2', previewPt.y);
            previewLine.style.display = (gameState === 'playing') ? 'block' : 'none';
        }

        function updateFlywheelUI() {
            rotator.style.transform = `rotate(${currentAngle}deg)`;
            angleDisplay.innerText = `${Math.round(currentAngle).toString().padStart(3, '0')}°`;
        }

        // --- State Management ---
        function resetGame() {
            customers = generateLevel();
            placedLines = [0];
            currentAngle = 0;
            gameState = 'playing';
            
            renderCustomers();
            updatePizzaDisplay();
            updateFlywheelUI();
            
            feedbackBox.classList.add('hidden');
            pizzaWrapper.style.transform = "scale(1)";
            pizzaWrapper.classList.remove('shadow-[0_0_100px_rgba(74,222,128,0.8)]');
        }

        // --- Input Handling ---
        function startDrag(e) {
            if (gameState !== 'playing') return;
            isDragging = true;
            e.preventDefault();
        }

        function handleMove(e) {
            if (!isDragging) return;
            
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            const rect = flywheel.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            
            const x = clientX - centerX;
            const y = clientY - centerY;
            
            // Calculate angle from center
            let deg = Math.atan2(y, x) * (180 / Math.PI) + 90;
            if (deg < 0) deg += 360;
            
            // Snap to 1 degree
            currentAngle = Math.round(deg) % 360;
            
            updateFlywheelUI();
            updatePizzaDisplay();
        }

        function stopDrag() {
            isDragging = false;
        }

        // --- Button Logic ---
        btnMakeSlice.addEventListener('click', () => {
            if (gameState !== 'playing') return;
            if (!placedLines.includes(currentAngle)) {
                placedLines.push(currentAngle);
                // Clear any existing anger on new move
                customers.forEach(c => c.angry = false);
                renderCustomers();
                updatePizzaDisplay();
            }
        });

        btnClear.addEventListener('click', () => {
            if (gameState === 'success') {
                resetGame();
            } else {
                placedLines = [0];
                customers.forEach(c => c.angry = false);
                gameState = 'playing';
                renderCustomers();
                updatePizzaDisplay();
                feedbackBox.classList.add('hidden');
            }
        });

        btnSliceNow.addEventListener('click', () => {
            if (gameState !== 'playing') return;
            
            // Calculate the actual angular sectors created by the lines
            const sortedLines = [...placedLines].sort((a, b) => a - b);
            const actualSectors = [];
            
            for (let i = 1; i < sortedLines.length; i++) {
                actualSectors.push(sortedLines[i] - sortedLines[i - 1]);
            }
            // Add the final sector wrapping back to 360
            actualSectors.push(360 - sortedLines[sortedLines.length - 1]);

            // Get target angles and compare
            const targets = customers.map(c => c.targetAngle).sort((a, b) => a - b);
            const actuals = actualSectors.sort((a, b) => a - b);

            let isCorrect = true;
            if (targets.length !== actuals.length) {
                isCorrect = false;
            } else {
                for (let i = 0; i < targets.length; i++) {
                    // Margin of error: 1 degree
                    if (Math.abs(targets[i] - actuals[i]) > 1) isCorrect = false;
                }
            }

            if (isCorrect) {
                gameState = 'success';
                successFlash.classList.add('active');
                setTimeout(() => successFlash.classList.remove('active'), 600);
                
                feedbackBox.innerHTML = `
                    <div class="text-green-400 text-xl mb-2">HYPERSPACE DELIVERY SUCCESSFUL!</div>
                    <div class="text-green-200/70 text-sm mb-4 italic">Proportions within 1° tolerance.</div>
                    <button id="btnNext" class="w-full bg-green-500 hover:bg-green-400 text-black font-black py-3 rounded-xl transition-all">NEXT ORDER</button>
                `;
                feedbackBox.className = "mt-8 p-5 rounded-2xl text-center font-bold bg-green-950/40 border-2 border-green-500 block";
                pizzaWrapper.classList.add('shadow-[0_0_100px_rgba(74,222,128,0.8)]');
                pizzaWrapper.style.transform = "scale(1.05)";
                
                document.getElementById('btnNext').onclick = resetGame;
            } else {
                gameState = 'fail';
                customers.forEach(c => c.angry = true);
                renderCustomers();
                feedbackBox.innerHTML = `
                    <div class="text-red-400 text-xl mb-1">INCORRECT SECTOR RATIO!</div>
                    <div class="text-red-300/60 text-xs italic uppercase">Customers are entering a rage state. Adjust slices.</div>
                `;
                feedbackBox.className = "mt-8 p-5 rounded-2xl text-center font-bold bg-red-950/40 border-2 border-red-500 block";
            }
        });

        // Event Listeners for Interaction
        knob.addEventListener('mousedown', startDrag);
        knob.addEventListener('touchstart', startDrag, { passive: false });
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('touchmove', handleMove, { passive: false });
        window.addEventListener('mouseup', stopDrag);
        window.addEventListener('touchend', stopDrag);

        // Start Game
        resetGame();
    </script>
</body>
</html>
